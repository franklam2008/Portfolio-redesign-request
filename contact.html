<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Contact — Frank Lam</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Get in touch with Frank Lam — software developer available for new projects.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="_ds/frank-lam-design-system-07ac32cb-b791-4eff-bd58-65886ecf30cc/tokens/fonts.css">
<link rel="stylesheet" href="_ds/frank-lam-design-system-07ac32cb-b791-4eff-bd58-65886ecf30cc/tokens/colors.css">
<link rel="stylesheet" href="_ds/frank-lam-design-system-07ac32cb-b791-4eff-bd58-65886ecf30cc/tokens/typography.css">
<link rel="stylesheet" href="_ds/frank-lam-design-system-07ac32cb-b791-4eff-bd58-65886ecf30cc/tokens/spacing.css">
<link rel="stylesheet" href="_ds/frank-lam-design-system-07ac32cb-b791-4eff-bd58-65886ecf30cc/tokens/base.css">
<link rel="stylesheet" href="_ds/frank-lam-design-system-07ac32cb-b791-4eff-bd58-65886ecf30cc/styles.css">
<script src="_ds/frank-lam-design-system-07ac32cb-b791-4eff-bd58-65886ecf30cc/_ds_bundle.js"></script>
</head>
<body style="margin:0;background:var(--surface-page);">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="content.js"></script>
<script type="text/babel" src="layout.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const { Input, Button } = window.FrankLamDesignSystem_07ac32;
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "logoStyle": "image"
}/*EDITMODE-END*/;
const { contactForm, contactLinks } = window.SITE;

function ContactSection() {
  const [values, setValues] = React.useState({ name: '', email: '', message: '' });
  const [status, setStatus] = React.useState('idle'); // idle | sending | sent | error

  const onChange = (key) => (e) => setValues((v) => ({ ...v, [key]: e.target.value }));
  const onSubmit = async (e) => {
    e.preventDefault();
    setStatus('sending');
    try {
      const res = await fetch(contactForm.formspreeEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify(values),
      });
      setStatus(res.ok ? 'sent' : 'error');
    } catch {
      setStatus('error');
    }
  };

  return (
    <section style={{ maxWidth: 'var(--container-max)', margin: '0 auto', padding: 'var(--space-9) var(--space-6) var(--space-9)' }}>
      <h1 style={{
        fontFamily: 'var(--font-mono)', fontSize: 'var(--text-2xl)', letterSpacing: 'var(--tracking-tight)',
        fontWeight: 'var(--weight-semibold)', color: 'var(--text-primary)', margin: '0 0 var(--space-3)',
      }}>
        {contactForm.heading}
      </h1>
      <p style={{ fontFamily: 'var(--font-mono)', fontSize: 'var(--text-md)', color: 'var(--text-secondary)', margin: '0 0 var(--space-7)', maxWidth: 560 }}>
        {contactForm.text}
      </p>

      <div style={{
        border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)',
        padding: 'var(--space-6)', background: 'var(--surface-raised)', maxWidth: 480, marginBottom: 'var(--space-8)',
      }}>
        {status === 'sent' ? (
          <p style={{ fontFamily: 'var(--font-mono)', fontSize: 'var(--text-sm)', color: 'var(--state-success)', margin: 0 }}>
            Sent. Thanks &mdash; I'll get back to you.
          </p>
        ) : (
          <form onSubmit={onSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 'var(--space-4)' }}>
            <Input label="Name" placeholder="Your name" value={values.name} onChange={onChange('name')} />
            <Input label="Email" type="email" placeholder="you@example.com" value={values.email} onChange={onChange('email')} />
            <Input label="Message" placeholder="What are you building?" multiline value={values.message} onChange={onChange('message')} />
            <p style={{ fontFamily: 'var(--font-mono)', fontSize: 'var(--text-xs)', color: 'var(--text-muted)', margin: 0 }}>
              {contactForm.disclaimer}
            </p>
            {status === 'error' && (
              <p style={{ fontFamily: 'var(--font-mono)', fontSize: 'var(--text-xs)', color: 'var(--state-danger)', margin: 0 }}>
                Something went wrong &mdash; try again, or email me directly.
              </p>
            )}
            <div>
              <Button variant="primary" type="submit" disabled={status === 'sending'}>
                {status === 'sending' ? 'Sending…' : 'Send'}
              </Button>
            </div>
          </form>
        )}
      </div>

      <div>
        <p style={{
          fontFamily: 'var(--font-mono)', fontSize: 'var(--text-xs)', letterSpacing: 'var(--tracking-wider)',
          textTransform: 'uppercase', color: 'var(--text-muted)', fontWeight: 'var(--weight-semibold)', margin: '0 0 var(--space-4)',
        }}>
          Or reach me directly
        </p>
        <div style={{ display: 'flex', gap: 'var(--space-3)', flexWrap: 'wrap' }}>
          {contactLinks.map((item) => (
            <Button key={item.label} as="a" href={item.href} target={item.href.startsWith('#') ? undefined : '_blank'} rel="noreferrer" variant="secondary" size="sm">
              {item.label}
            </Button>
          ))}
        </div>
      </div>
    </section>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <React.Fragment>
      <window.Header active="contact" logoStyle={t.logoStyle} />
      <ContactSection />
      <window.Footer />
      <TweaksPanel>
        <TweakSection label="Logo mark" />
        <TweakRadio label="Style" value={t.logoStyle}
                    options={['image', 'initials', 'wordmark-text']}
                    onChange={(v) => setTweak('logoStyle', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<body style="margin:0;background:var(--surface-page);">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="content.js"></script>
<script type="text/babel" src="layout.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const { Tag } = window.FrankLamDesignSystem_07ac32;
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "logoStyle": "initials"
}/*EDITMODE-END*/;
const { skillSections, languageNote } = window.SITE;

function SkillSection({ section }) {
  return (
    <div style={{ marginBottom: 'var(--space-7)' }}>
      <h2 style={{
        fontFamily: 'var(--font-mono)', fontSize: 'var(--text-xs)', letterSpacing: 'var(--tracking-wider)',
        textTransform: 'uppercase', color: 'var(--text-muted)', fontWeight: 'var(--weight-semibold)', margin: '0 0 var(--space-4)',
      }}>
        {section.title}
      </h2>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 'var(--space-2)' }}>
        {section.skills.map((s) => <Tag key={s} tone="accent">{s}</Tag>)}
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <React.Fragment>
      <window.Header active="skills" logoStyle={t.logoStyle} />
      <TweaksPanel>
        <TweakSection label="Logo mark" />
        <TweakRadio label="Style" value={t.logoStyle}
                    options={['image', 'initials', 'wordmark-text']}
                    onChange={(v) => setTweak('logoStyle', v)} />
      </TweaksPanel>
      <section style={{ maxWidth: 'var(--container-max)', margin: '0 auto', padding: 'var(--space-9) var(--space-6) var(--space-9)' }}>
        <h1 style={{
          fontFamily: 'var(--font-mono)', fontSize: 'var(--text-2xl)', letterSpacing: 'var(--tracking-tight)',
          fontWeight: 'var(--weight-semibold)', color: 'var(--text-primary)', margin: '0 0 var(--space-7)',
        }}>
          Skill set.
        </h1>
        {skillSections.map((section) => <SkillSection key={section.title} section={section} />)}
        <p style={{
          fontFamily: 'var(--font-mono)', fontSize: 'var(--text-sm)', lineHeight: 'var(--leading-normal)',
          color: 'var(--text-secondary)', borderTop: '1px solid var(--border-subtle)', paddingTop: 'var(--space-5)', marginTop: 'var(--space-3)',
        }}>
          {languageNote}
        </p>
      </section>
      <window.Footer />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
